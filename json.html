<!DOCTYPE html>
<html>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON.parse() and JSON.stringify() </title>
    <style>
        
        *{
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            justify-items: center;
            align-items: center;
            text-align: center;
            margin: 10px;
            padding: 10px;
        }

        h2{
            font-size: 50px;
        }

        button{
            width: 300px;
            height: 300px;
            background-color: rgb(38, 255, 0);
            border: 6px solid black;
            margin: 10px;
            border-radius: 50%;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            justify-self: center;
            color: white;
            cursor: pointer;
            box-shadow: 4px 5px 4px 0px rgba(0,0,0,0.75);
        }
        #btn:active {
            background-color: rgb(34, 224, 0);
            transform: scale(0.95);
            cursor: pointer;
        }

        #output{
            font-size: 30px;
        }

        #btn2:active {
            background-color: rgb(169, 0, 0);
            transform: scale(0.95);
            cursor: pointer;
        }

        #btn2{
            background-color: rgb(215, 0, 0);
        }

    </style>
</head>
<body>

<h2>Score Tracker</h2>

<!-- Button to trigger score update -->
 
<button id ="btn" onclick="updateScore(1)">Add a Point</button>
<button id="btn2" onclick="updateScore(0)">Remove a Point</button>

<!-- Where it displays the JSON string -->
<p id="output"></p>

<p id="output2"></p>

<script>

// This is a JSON string
let playerStr = '{"name":"Alex","score":0}';

document.getElementById("output").innerText = "Score: ";

function updateScore(val) {

    // Convert JSON string -> JavaScript object
    let playerObj = JSON.parse(playerStr);

    // Modify the object
    // This updates the score based on the value thats been sent
    if (val == 1){
        playerObj.score += 1;
        console.log("score " + playerObj.score + ", 1 was added");
    } else if (playerObj.score > 0){
            playerObj.score -= 1;
            console.log("score " + playerObj.score + ", 1 was removed");
        
    };
     
    // Convert the updated object -> JSON string again
    // This is useful for saving or sending data
    playerStr = JSON.stringify(playerObj);

    // Display the updated JSON string
    document.getElementById("output").innerText = "Score: " + playerObj.score;

    // This checks if the value is at 0 so it doesn't 
    if (playerObj.score >= 10){
        document.getElementById("output2").innerText = "yay you got over 10 points!";
        
        
    } else if (playerObj.score == 0){
            document.getElementById("output2").innerText = "Not enough points to remove.";
        } else {
        document.getElementById("output2").innerText = " "; 
    }};
    
</script>

</body>
</html>
